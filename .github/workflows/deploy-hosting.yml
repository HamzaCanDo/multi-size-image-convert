name: Deploy to Paid Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DEPLOY_PROTOCOL: ${{ secrets.DEPLOY_PROTOCOL }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      DEPLOY_REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail

          # Normalize common copy/paste issues in secrets (extra spaces, CRLF, protocol prefixes).
          trim() {
            local value="$1"
            value="${value//$'\r'/}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf "%s" "$value"
          }

          protocol="$(trim "${DEPLOY_PROTOCOL:-sftp}")"
          protocol="${protocol,,}"
          host="$(trim "${DEPLOY_HOST:-}")"
          username="$(trim "${DEPLOY_USERNAME:-}")"
          remote_path="$(trim "${DEPLOY_REMOTE_PATH:-}")"
          port="$(trim "${DEPLOY_PORT:-}")"

          host="${host#sftp://}"
          host="${host#ftps://}"
          host="${host#ftp://}"

          if [[ "$host" == */* ]]; then
            echo "::warning::DEPLOY_HOST contained a path segment. Only the host name will be used."
            host="${host%%/*}"
          fi

          if [ -z "$port" ] && [[ "$host" =~ ^([^:]+):([0-9]+)$ ]]; then
            host="${BASH_REMATCH[1]}"
            port="${BASH_REMATCH[2]}"
          fi

          missing=0

          if [ -z "$host" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_HOST"
            missing=1
          fi

          if [ -z "$username" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_USERNAME"
            missing=1
          fi

          if [ -z "${DEPLOY_PASSWORD:-}" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_PASSWORD"
            missing=1
          fi

          if [ -z "$remote_path" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_REMOTE_PATH"
            missing=1
          fi

          case "$protocol" in
            sftp|ftps|ftp) ;;
            *)
              echo "::error::DEPLOY_PROTOCOL must be one of: sftp, ftps, ftp"
              missing=1
              ;;
          esac

          if [[ "$host" =~ [[:space:]] ]]; then
            echo "::error::DEPLOY_HOST must not contain spaces. Use host only (example: ftp.yourdomain.com)."
            missing=1
          fi

          if [ -n "$port" ] && ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT must be numeric."
            missing=1
          fi

          if [ -n "$port" ] && { [ "$port" -lt 1 ] || [ "$port" -gt 65535 ]; }; then
            echo "::error::DEPLOY_PORT must be between 1 and 65535."
            missing=1
          fi

          if [ "$missing" -eq 0 ] && ! getent hosts "$host" > /dev/null; then
            echo "::error::DEPLOY_HOST could not be resolved from GitHub runner DNS: $host"
            echo "::error::Use host only (no protocol, no path) and verify spelling in secret DEPLOY_HOST."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::Add required secrets before running deploy."
            exit 1
          fi

          echo "DEPLOY_PROTOCOL=$protocol" >> "$GITHUB_ENV"
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
          echo "DEPLOY_USERNAME=$username" >> "$GITHUB_ENV"
          echo "DEPLOY_REMOTE_PATH=$remote_path" >> "$GITHUB_ENV"
          if [ -n "$port" ]; then
            echo "DEPLOY_PORT=$port" >> "$GITHUB_ENV"
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site files
        shell: bash
        run: |
          set -euo pipefail

          protocol="$DEPLOY_PROTOCOL"
          port="${DEPLOY_PORT:-}"

          if [ -z "$port" ]; then
            if [ "$protocol" = "sftp" ]; then
              port="22"
            else
              port="21"
            fi
          fi

          ssl_cmd=""
          if [ "$protocol" = "ftps" ]; then
            ssl_cmd="set ftp:ssl-force true; set ftp:ssl-protect-data true;"
          elif [ "$protocol" = "ftp" ]; then
            ssl_cmd="set ftp:ssl-force false;"
          fi

          lftp -c "
            set net:max-retries 2;
            set net:timeout 20;
            set xfer:clobber on;
            ${ssl_cmd}
            open -u \"$DEPLOY_USERNAME\",\"$DEPLOY_PASSWORD\" -p \"$port\" \"$protocol://$DEPLOY_HOST\";
            mirror -R --only-newer --verbose \
              --exclude-glob .git* \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob *.log \
              ./ \"$DEPLOY_REMOTE_PATH\";
            bye
          "
