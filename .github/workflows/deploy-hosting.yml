name: Deploy to Paid Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DEPLOY_PROTOCOL: ${{ secrets.DEPLOY_PROTOCOL }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      DEPLOY_REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
      DEPLOY_FTPS_INSECURE: ${{ secrets.DEPLOY_FTPS_INSECURE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail

          # Normalize common copy/paste issues in secrets (extra spaces, CRLF, protocol prefixes).
          trim() {
            local value="$1"
            value="${value//$'\r'/}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf "%s" "$value"
          }

          protocol="$(trim "${DEPLOY_PROTOCOL:-sftp}")"
          protocol="${protocol,,}"
          host="$(trim "${DEPLOY_HOST:-}")"
          username="$(trim "${DEPLOY_USERNAME:-}")"
          remote_path="$(trim "${DEPLOY_REMOTE_PATH:-}")"
          port="$(trim "${DEPLOY_PORT:-}")"
          ftps_insecure="$(trim "${DEPLOY_FTPS_INSECURE:-false}")"
          ftps_insecure="${ftps_insecure,,}"

          host="${host#sftp://}"
          host="${host#ftps://}"
          host="${host#ftp://}"

          if [[ "$host" == */* ]]; then
            echo "::warning::DEPLOY_HOST contained a path segment. Only the host name will be used."
            host="${host%%/*}"
          fi

          if [ -z "$port" ] && [[ "$host" =~ ^([^:]+):([0-9]+)$ ]]; then
            host="${BASH_REMATCH[1]}"
            port="${BASH_REMATCH[2]}"
          fi

          missing=0

          if [ -z "$host" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_HOST"
            missing=1
          fi

          if [ -z "$username" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_USERNAME"
            missing=1
          fi

          if [ -z "${DEPLOY_PASSWORD:-}" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_PASSWORD"
            missing=1
          fi

          if [ -z "$remote_path" ]; then
            echo "::error::Missing or empty GitHub secret: DEPLOY_REMOTE_PATH"
            missing=1
          fi

          case "$protocol" in
            sftp|ftps|ftp) ;;
            *)
              echo "::error::DEPLOY_PROTOCOL must be one of: sftp, ftps, ftp"
              missing=1
              ;;
          esac

          case "$ftps_insecure" in
            ""|false|0|no)
              ftps_insecure="false"
              ;;
            true|1|yes)
              ftps_insecure="true"
              ;;
            *)
              echo "::error::DEPLOY_FTPS_INSECURE must be true or false when provided."
              missing=1
              ;;
          esac

          if [[ "$host" =~ [[:space:]] ]]; then
            echo "::error::DEPLOY_HOST must not contain spaces. Use host only (example: ftp.yourdomain.com)."
            missing=1
          fi

          if [ -n "$port" ] && ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT must be numeric."
            missing=1
          fi

          if [ -n "$port" ] && { [ "$port" -lt 1 ] || [ "$port" -gt 65535 ]; }; then
            echo "::error::DEPLOY_PORT must be between 1 and 65535."
            missing=1
          fi

          if [ "$missing" -eq 0 ] && ! getent hosts "$host" > /dev/null; then
            echo "::error::DEPLOY_HOST could not be resolved from GitHub runner DNS: $host"
            echo "::error::Use host only (no protocol, no path) and verify spelling in secret DEPLOY_HOST."
            missing=1
          fi

          if [ "$protocol" = "ftps" ] && [ "$ftps_insecure" = "true" ]; then
            echo "::warning::FTPS certificate verification is disabled via DEPLOY_FTPS_INSECURE=true."
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::Add required secrets before running deploy."
            exit 1
          fi

          echo "DEPLOY_PROTOCOL=$protocol" >> "$GITHUB_ENV"
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
          echo "DEPLOY_USERNAME=$username" >> "$GITHUB_ENV"
          echo "DEPLOY_REMOTE_PATH=$remote_path" >> "$GITHUB_ENV"
          echo "DEPLOY_FTPS_INSECURE=$ftps_insecure" >> "$GITHUB_ENV"
          if [ -n "$port" ]; then
            echo "DEPLOY_PORT=$port" >> "$GITHUB_ENV"
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site files
        shell: bash
        run: |
          set -euo pipefail

          protocol="$DEPLOY_PROTOCOL"
          port="${DEPLOY_PORT:-}"
          ftps_insecure="${DEPLOY_FTPS_INSECURE:-false}"
          remote_path="$DEPLOY_REMOTE_PATH"

          if [ -z "$port" ]; then
            if [ "$protocol" = "sftp" ]; then
              port="22"
            else
              port="21"
            fi
          fi

          if [ "$protocol" != "sftp" ] && [[ "$remote_path" == /home/* ]]; then
            normalized_path="$(printf "%s" "$remote_path" | sed -E 's#^/home/[^/]+##')"
            if [ -z "$normalized_path" ]; then
              normalized_path="/"
            fi
            echo "::warning::Using FTP/FTPS chroot path normalization: $remote_path -> $normalized_path"
            remote_path="$normalized_path"
          fi

          ssl_cmd=""
          if [ "$protocol" = "ftps" ]; then
            if [ "$ftps_insecure" = "true" ]; then
              echo "::warning::FTPS certificate verification is disabled for this run."
              ssl_cmd="set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no;"
            else
              ssl_cmd="set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate yes;"
            fi
          elif [ "$protocol" = "ftp" ]; then
            ssl_cmd="set ftp:ssl-force false;"
          fi

          echo "Deploy target: protocol=$protocol host=$DEPLOY_HOST port=$port path=$remote_path"

          if ! timeout 8 bash -c "cat < /dev/null > /dev/tcp/$DEPLOY_HOST/$port" 2>/dev/null; then
            echo "::error::Cannot connect to $DEPLOY_HOST:$port from GitHub Actions runner."
            echo "::error::Check protocol/port, hosting firewall, and whether remote FTP/SFTP access is allowed."
            exit 1
          fi

          echo "Running remote access diagnostics before mirror upload..."
          lftp -c "
            set cmd:fail-exit true;
            set net:max-retries 1;
            set net:timeout 60;
            set net:connection-limit 1;
            set ftp:passive-mode true;
            set ftp:prefer-epsv true;
            set sftp:auto-confirm yes;
            ${ssl_cmd}
            open -u \"$DEPLOY_USERNAME\",\"$DEPLOY_PASSWORD\" -p \"$port\" \"$protocol://$DEPLOY_HOST\";
            pwd;
            mkdir -p \"$remote_path\";
            cd \"$remote_path\";
            pwd;
            bye
          "

          lftp -c "
            set cmd:fail-exit true;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-multiplier 1;
            set net:reconnect-interval-max 20;
            set net:timeout 60;
            set net:connection-limit 1;
            set xfer:clobber on;
            set ftp:passive-mode true;
            set ftp:prefer-epsv true;
            set sftp:auto-confirm yes;
            ${ssl_cmd}
            open -u \"$DEPLOY_USERNAME\",\"$DEPLOY_PASSWORD\" -p \"$port\" \"$protocol://$DEPLOY_HOST\";
            mkdir -p \"$remote_path\";
            cd \"$remote_path\";
            mirror -R --only-newer --verbose \
              --exclude-glob .git* \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob *.log \
              ./ .;
            bye
          "
