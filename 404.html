<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | MultiSize</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f6f9f8 0%, #ffffff 60%);
        color: #142120;
      }

      main {
        width: min(560px, calc(100% - 2rem));
        border: 1px solid #dbe6e2;
        border-radius: 16px;
        background: #ffffff;
        padding: 1.2rem;
        box-shadow: 0 20px 38px -28px rgba(16, 42, 37, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 1.3rem;
      }

      p {
        margin: 0.65rem 0 0;
        color: #4a5f5a;
        line-height: 1.55;
      }

      a {
        display: inline-block;
        margin-top: 0.95rem;
        color: #11705f;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>The page you requested does not exist. Return to the home page to continue using MultiSize.</p>
      <a href="./">Go to MultiSize</a>
    </main>
  </body>
</html>
